<!DOCTYPE html
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spothouse | Secure Payment</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="/data-script/payment.js"></script>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <!-- Simple Nav -->
    <nav class="bg-slate-900 text-white p-6 shadow-md">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="text-2xl font-bold text-yellow-500 tracking-tighter">SPOTHOUSE</div>
            <a href="/contact.html" class="text-sm hover:text-yellow-500 transition">
                <i class="fas fa-arrow-left mr-2">

                </i>Back to Listings
            </a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto py-12 px-4">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Summary Column (Left) -->
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                    
                </div>
                <div class="bg-yellow-50 border border-yellow-200 p-4 rounded-xl flex gap-3 items-start">
                    <i class="fas fa-shield-alt text-yellow-600 mt-1"></i>
                    <p class="text-xs text-yellow-800 leading-relaxed">Your payment is encrypted and secured by Spothouse Protected Pay. <br><br>
                         We never store your full card details.</p>
                </div>
            </div>

            <!-- Payment Form Column (Right) -->
            <div class="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
                <h2 class="text-2xl font-bold text-slate-800 mb-6">Payment Method</h2>
                
                <!-- Payment Tabs -->
                <div class="flex gap-4 mb-8">
                <div class="flex gap-4 mb-8">
                <button class="payment-btn border-slate-900 bg-slate-50 border p-4 rounded-lg flex-1">
                 <i class="fas fa-mobile-alt"></i> <span>M-Pesa</span>
                </button>
                <button class="payment-btn border-gray-100 border p-4 rounded-lg flex-1">
                  <i class="fas fa-credit-card"></i> <span>Card</span>
                </button>
                <button class="payment-btn border-gray-100 border p-4 rounded-lg flex-1">
                   <i class="fas fa-university"></i> <span>Bank</span>
                </button>
                </div>

                </div>

                <form class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Full Name on Card</label>
                        <input type="text" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-slate-900
                         focus:border-transparent outline-none transition" placeholder="Derrick Wanyama"><br><br>
                    </div>
                    
                    <div class="relative">
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Card Number</label>
                        <input type="text" class="w-full border border-gray-300 rounded-lg px-4 py-3 pr-12 outline-none 
                        focus:ring-2 focus:ring-slate-900" placeholder="0000 0000 0000 0000"><br><br>

                        <div class="absolute right-4 top-9 flex gap-1">
                            <i class="fab fa-cc-visa text-gray-400 text-xl"></i>
                            <i class="fab fa-cc-mastercard text-gray-400 text-xl"></i>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Expiry Date</label>
                            <input type="text" class="w-full border border-gray-300 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-slate-900" placeholder="MM / YY"><br><br>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">CVV</label>
                            <input type="text" class="w-full border border-gray-300 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-slate-900" placeholder="123"><br><br>
                        </div>
                    </div>

                    <div class="pt-6">
                        <button type="button" onclick="makepayment()" class = "w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-xl shadow-lg shadow-slate-200 transition transform active:scale-95">
                           <a href="/dashbord.html"> Complete Secure Payment</a>
                        </button><br>
                    </div>
                </form>
            </div>

        </div>
    </main>

    <footer class="text-center py-8 text-gray-400 text-xs">
        <div class="flex justify-center gap-4 mb-4">
            <i class="fab fa-cc-stripe text-2xl"></i>
            <i class="fab fa-cc-paypal text-2xl"></i>
            <i class="fab fa-cc-apple-pay text-2xl"></i>
        </div>
        <p>&copyright; 2026 Spothouse Payment Gateway. All transactions are logged for security.</p>
    </footer>

</body>
</html>
