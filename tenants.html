<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rent application form</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="m-10">
    <div id="application-form">
    <div>
        <h2 class="font-bold text-2xl text-center">Rent Application Form</h2>
    </div>
    <div id="tenant-contact">
    <div class=" grid m-4 gap-4 w-full">
        <h2 class="text-white bg-blue-600 py-2 px-3 m-4">Personal information</h2>
        <form >
            <label>Name:</label>
            <input type=" Full name"placeholder class="border border-black w-1/2"> <br><br>
            <label>Email:</label>
            <input type="Email"placeholder class="border border-black  w-1/2"><br><br>
            <label>Phone:</label> 
            <input type="number"placeholder class="border border-black w-1/2"><br><br>
            <label>Date of Birth:</label>
            <input type="Date" placeholder class="border border-black w-1/2"> <br><br>
            <label>Social Security Number:</label>
            <input type="number"placeholder class="border border-black w-1/2">
        </form>
    </div>
    <div class=" grid m-4 gap-4 w-full">
        <h2 class="text-white bg-blue-600 py-2 px-3 m-4">Current Address</h2>
        <form >
            <label> Address:</label>
            <input type="number"placeholder class="border border-black w-1/2"><br><br>
            <label>City/Estate:</label>
            <input type="text"placeholder class="border border-black w-1/2"><br><br>
            <label>Property Manager's Name:</label>
            <input type="text"placeholder class="border border-black w-1/2"> <br><br>
            <label>Property Manager's phone number: </label>
            <input type="nunber"placeholder class="border border-black w-1/2"> <br><br>
            <label>Social Security number:</label>
            <input type="number"placeholder class="border border-black w-1/2"> <br><br>
            <label>Monthly rent:</label>
            <input type="number"placeholder class="border border-black w-1/2">
        </form>
    </div>
    <div class=" grid m-4 gap-10 w-full">
        <h2 class="text-white bg-blue-600 py-2 px-3 m-4">Employment Informaation</h2>
        <form >
            <label>Current Employer:</label>
            <input type="Current employer" placeholder class="border border-black w-1/2 gap-4"> <br><br>
            <label>Job Title:</label>
            <input type="text"placeholder class="border border-black w-1/2"> <br><br>
            <label>Employment Date start:</label>
            <input type="Date"placeholder class="border border-black w-1/2"> <br><br>
            <label>Supervisor's Name:</label>
            <input type="text"placeholder class="border border-black w-1/2"> <br><br>
            <label>Supervisor's phone Number:</label>
            <input type="Number"placeholder class="border border-black w-1/2"> <br><br>
            <button class="text-white m-10 bg-blue-600 rounded-[40%] hover:text-green-400 p-2 mt-4" onclick="alert('Application submitted!')">
                <a href="landload.html">Submit</a>
            </button>
        </form>
    </div>
        <div>
            <form id="massage-form">
                <label for="message" class="text-sm font-bold">Message:</label><br>
                <textarea id="message" name="message" rows="4" cols="50" class="border border-black w-1/2"></textarea><br><br>
                <button class="text-white m-10 bg-blue-600 rounded-[40%] hover:text-green-400 p-2 mt-4" onclick="alert('Message sent!')">
                    <a href="landload.html">Send Message</a>
                </button>
            </form>
            <div id="feedback-message"></div>
        </div>
    </div>
    <button class=" m-10 p-2 border rounded-[40%] border-transparent text-white bg-blue-600" onclick="alert('Returning to contact page!')">
        <a href="contact.html">Back</a>
    </button>

    </div>
</body>
</html>
