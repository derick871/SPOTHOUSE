<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Rental Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen pb-12">

    <nav class="bg-slate-900 text-white p-4 shadow-lg mb-8">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight">
                <i class="fa-solid fa-house-chimney-window text-amber-500 mr-2"></i> 
                SPOTHOUSE <span class="font-light text-slate-400">MANAGER</span>
            </h1>
            <div class="flex gap-4">
                <button onclick="toggleView('admin')" id="adminBtn" class="bg-slate-700 px-4 py-1 rounded-full text-xs font-bold border-2 border-amber-500">ADMIN VIEW</button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-emerald-500">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-slate-500 text-xs font-bold uppercase tracking-wider">Total Revenue</p>
                        <h2 class="text-3xl font-bold text-slate-800" id="totalRevenue">Ksh 0</h2>
                    </div>
                    <i class="fa-solid fa-money-bill-trend-up text-3xl text-emerald-100"></i>
                </div>
            </div>
            
            <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-blue-500">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-slate-500 text-xs font-bold uppercase tracking-wider">Units Listed</p>
                        <h2 class="text-3xl font-bold text-slate-800" id="occupiedCount">0</h2>
                    </div>
                    <i class="fa-solid fa-building text-3xl text-blue-100"></i>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-orange-500">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-slate-500 text-xs font-bold uppercase tracking-wider"></p>
                        <h2 class="text-3xl font-bold text-slate-800" id="tenantCount">0</h2>
                    </div>
                    <i class="fa-solid fa-users text-3xl text-orange-100"></i>
                </div>
            </div>
        </div>

        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold text-slate-800" id="viewTitle">Property Management</h3>
            <div class="flex items-center gap-2">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Live Sync</span>
            </div>
        </div>

        <div id="houseGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div class="col-span-full text-center py-20">
                <i class="fas fa-spinner fa-spin text-3xl text-slate-300"></i>
                <p class="text-slate-400 mt-4">Loading Spothouse units...</p>
            </div>
        </div>
    </div>

    <script src="/data-script/dashbord.js"></script>
</body>
</html>
