<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body>
    <div class="flex h-screen bg-slate-50">
  <!-- Sidebar Navigation -->
  <aside class="w-64 bg-slate-900 text-white p-6">
    <h2 class="text-xl font-bold mb-8">Admin Panel</h2>
    <nav class="space-y-4">
      <a href="#" class="block hover:text-yellow-500">Dashboard</a>
      <a href="#" class="block hover:text-yellow-500">Manage Houses</a>
      <a href="#" class="block hover:text-yellow-500">Payments</a>
      <a href="#" class="block hover:text-yellow-500">Revenue Reports</a>
    </nav>
  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 p-8 overflow-y-auto">
    <!-- Header with KPI Cards -->
    <header class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
        <p class="text-xs font-bold text-slate-500 uppercase">Total Revenue</p>
        <h3 class="text-2xl font-bold text-slate-900">Ksh 1,240,000</h3>
      </div>
      <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
        <p class="text-xs font-bold text-slate-500 uppercase">Occupancy Rate</p>
        <h3 class="text-2xl font-bold text-green-600">92%</h3>
      </div>
      <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
        <p class="text-xs font-bold text-slate-500 uppercase">Overdue Payments</p>
        <h3 class="text-2xl font-bold text-red-500">4</h3>
      </div>
    </header>

    <!-- Property & Payment Table -->
    <section class="bg-white rounded-xl shadow-sm border border-slate-200">
      <div class="p-6 border-b border-slate-100 flex justify-between items-center">
        <h2 class="text-lg font-bold text-slate-800">Recent House Payments</h2>
        <button class="bg-slate-900 text-white px-4 py-2 rounded-lg text-sm">Export Report</button>
      </div>
      <table class="w-full text-left border-collapse">
        <thead class="bg-slate-50 text-slate-500 uppercase text-xs">
          <tr>
            <th class="px-6 py-3 font-bold">Property</th>
            <th class="px-6 py-3 font-bold">Tenant</th>
            <th class="px-6 py-3 font-bold">Amount</th>
            <th class="px-6 py-3 font-bold">Status</th>
          </tr>
        </thead>
        <tbody class="divide-y text-amber-100 divide-slate-100">
          <tr>
            <td class="px-6 py-4 font-medium"></td>
            <td class="px-6 py-4"></td>
            <td class="px-6 py-4">Ksh.0</td>
            <td class="px-6 py-4"><span class="px-2 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold">Paid</span></td>
          </tr>
          <!-- Repeat rows for more properties -->
        </tbody>
      </table>
    </section>
  </main>
</div>
<script src="/data-script/dashbord.js"></script>

</body>
</html>
